<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- bg -->
  <rect width="100" height="100" rx="18" fill="#0a0a0a"/>

  <!-- deep lime ghost -->
  <text x="56" y="82" text-anchor="middle"
        font-family="'Syne','Arial Black',sans-serif"
        font-size="72" font-weight="800"
        fill="#c8f135" opacity="0.07">A</text>

  <!-- main A white -->
  <text x="50" y="80" text-anchor="middle"
        font-family="'Syne','Arial Black',sans-serif"
        font-size="72" font-weight="800"
        fill="#ffffff">A</text>

  <!-- lime outline ghost offset -->
  <text x="52" y="80" text-anchor="middle"
        font-family="'Syne','Arial Black',sans-serif"
        font-size="72" font-weight="800"
        fill="none" stroke="#c8f135" stroke-width="1"
        opacity="0.45">A</text>

  <!-- scan-line slice -->
  <rect x="0" y="48" width="100" height="4" fill="#0a0a0a"/>
  <rect x="0" y="48" width="100" height="4" fill="#c8f135" opacity="0.88"/>

  <!-- secondary thin slice -->
  <rect x="0" y="41" width="65" height="1.5" fill="#c8f135" opacity="0.25"/>

  <!-- corner accent -->
  <rect x="82" y="82" width="6" height="6" fill="#c8f135"/>
</svg>
